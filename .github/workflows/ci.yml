name: verify-and-export

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6.3"
  GODOT_STATUS: "stable"

jobs:
  verify-and-export:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout source and LFS
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Install pinned Godot and export templates
        shell: bash
        run: |
          set -euo pipefail
          base="https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-${GODOT_STATUS}"
          curl --fail --location --retry 3 -o /tmp/godot.zip \
            "${base}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 "/tmp/godot/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64" /usr/local/bin/godot
          curl --fail --location --retry 3 -o /tmp/templates.tpz \
            "${base}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz"
          template_dir="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          mkdir -p "${template_dir}"
          unzip -q /tmp/templates.tpz -d /tmp/godot-templates
          mv /tmp/godot-templates/templates/* "${template_dir}/"
          godot --version

      - name: Configure Android debug signing
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.android"
          if [[ ! -f "${HOME}/.android/debug.keystore" ]]; then
            keytool -genkeypair -v -keystore "${HOME}/.android/debug.keystore" \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          settings_dir="${XDG_CONFIG_HOME:-${HOME}/.config}/godot"
          mkdir -p "${settings_dir}"
          printf '%s\n' \
            '[gd_resource format=3]' \
            '' \
            '[resource]' \
            "export/android/android_sdk_path = \"${ANDROID_HOME}\"" \
            "export/android/java_sdk_path = \"${JAVA_HOME}\"" \
            "export/android/debug_keystore = \"${HOME}/.android/debug.keystore\"" \
            'export/android/debug_keystore_user = "androiddebugkey"' \
            'export/android/debug_keystore_pass = "android"' \
            > "${settings_dir}/editor_settings-4.6.tres"

      - name: Headless import
        run: godot --headless --path . --import

      - name: Automated brain and integration tests
        run: godot --headless --path . --script tests/run_tests.gd

      - name: Full main-scene smoke test
        run: godot --headless --path . --script tools/smoke_boot.gd

      - name: Static validation
        run: godot --headless --path . --script tools/static_validate.gd

      - name: Export browser
        run: |
          mkdir -p builds/web
          godot --headless --path . --export-release "Web" builds/web/index.html

      - name: Export Windows
        run: |
          mkdir -p builds/windows
          godot --headless --path . --export-release "Windows" builds/windows/THE_FIRST_NIGHT.exe
          cd builds/windows
          zip -9 ../THE_FIRST_NIGHT-windows.zip THE_FIRST_NIGHT.exe

      - name: Export Android debug APK
        run: |
          mkdir -p builds/android
          godot --headless --path . --export-debug "Android" builds/android/the-first-night-debug.apk

      - name: Checksums
        run: |
          cd builds
          sha256sum THE_FIRST_NIGHT-windows.zip android/the-first-night-debug.apk > SHA256SUMS.txt

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: THE-FIRST-NIGHT-Windows-${{ github.sha }}
          path: builds/THE_FIRST_NIGHT-windows.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: THE-FIRST-NIGHT-Android-${{ github.sha }}
          path: builds/android/the-first-night-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS-${{ github.sha }}
          path: builds/SHA256SUMS.txt

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: builds/web

    outputs:
      commit: ${{ github.sha }}

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify-and-export
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy browser build
        id: deployment
        uses: actions/deploy-pages@v4
